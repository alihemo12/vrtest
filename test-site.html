<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Site</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #38bdf8;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  header {
    text-align: center;
    margin-bottom: 40px;
  }
  h1 {
    font-size: 2.5rem;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p.subtitle {
    color: var(--muted);
    margin-top: 8px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    max-width: 900px;
    width: 100%;
  }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
  }
  .card h2 {
    font-size: 1.1rem;
    margin-bottom: 10px;
    color: var(--accent);
  }
  .card p {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.5;
  }
  button {
    margin-top: 30px;
    background: var(--accent);
    color: #0f172a;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 1rem;
    transition: opacity 0.2s ease;
  }
  button:hover { opacity: 0.85; }
  #counter-display {
    margin-top: 16px;
    font-size: 1.2rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1>Test Site</h1>
  <p class="subtitle">A minimal page for checking things work</p>
</header>

<div class="grid">
  <div class="card">
    <h2>Layout</h2>
    <p>Responsive grid that reflows on smaller screens using auto-fit.</p>
  </div>
  <div class="card">
    <h2>Styling</h2>
    <p>Dark theme with CSS variables so colors are easy to tweak.</p>
  </div>
  <div class="card">
    <h2>Interactivity</h2>
    <p>A simple counter below to confirm JavaScript is running.</p>
  </div>
</div>

<button onclick="increment()">Click me</button>
<div id="counter-display">Clicked 0 times</div>

<script>
  let count = 0;
  function increment() {
    count++;
    document.getElementById('counter-display').textContent = `Clicked ${count} time${count === 1 ? '' : 's'}`;
  }
</script>

</body>
</html>
